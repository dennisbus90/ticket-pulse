modules:
  jira:issueContext:
    - key: ticket-pulse-panel
      title: Ticket Pulse
      label: Ticket Pulse
      resource: ticket-pulse
      resolver:
        function: resolver
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: ticket-pulse
    path: static/ticket-pulse/dist
permissions:
  scopes:
    - read:jira-work
    - storage:app
    - read:issue-details:jira
    - read:project:jira
  external:
    fetch:
      backend:
        - api.openai.com
      client:
        - api.openai.com
app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/e9753c04-110a-4bc5-8e85-caafb15f5d7e
